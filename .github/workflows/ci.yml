---
name: CI
"on":
  pull_request:
  push:
    branches:
      - main

env:
  ROLE_NAME: "joshkreud.borgmatic"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v5

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies.
        run: uv sync --locked --all-extras --dev

      - name: Ansible-Lint
        run: |
          uv run ansible-lint .

      - name: Yamllint
        run: |
          uv run yamllint .

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - ubuntu2404
          - debian12
          - debian13

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v5

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install test dependencies.
        run: uv sync --locked --all-extras --dev

      - name: Run Molecule tests.
        run: uv run molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}
